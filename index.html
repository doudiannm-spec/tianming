<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋在線對戰</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh; display: flex; justify-content: center; align-items: center;
        }
        .container {
            background: rgba(255,255,255,0.95); border-radius: 20px;
            padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            max-width: 500px; width: 90%; text-align: center;
        }
        canvas { 
            border: 5px solid #333; border-radius: 15px; 
            background: #f4e4bc; cursor: crosshair;
            display: block; margin: 20px auto;
        }
        input, button {
            padding: 12px 20px; margin: 10px; border: none;
            border-radius: 25px; font-size: 16px; font-family: inherit;
        }
        input { border: 2px solid #ddd; width: 200px; }
        button {
            background: linear-gradient(45deg, #ff6b6b, #ee5a24);
            color: white; cursor: pointer; font-weight: bold;
        }
        button:hover { transform: scale(1.05); }
        .status {
            font-size: 20px; margin: 20px 0; font-weight: bold;
            min-height: 30px;
        }
        .room-info {
            background: #e8f4f8; padding: 15px; border-radius: 10px;
            margin: 15px 0;
        }
        .code-display {
            font-size: 32px; font-weight: bold; color: #ff6b6b;
            letter-spacing: 8px; background: white;
            padding: 10px; border-radius: 10px; margin: 10px 0;
        }
        .player {
            display: inline-block; width: 40px; height: 40px;
            border-radius: 50%; margin: 0 10px; font-weight: bold;
        }
        .black { background: #333; color: white; }
        .white { background: #fff; color: #333; border: 2px solid #333; }
        .waiting { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container" id="gameContainer">
        <!-- 步驟1：設定暱稱 -->
        <div id="step1">
            <h2>🎮 五子棋在線對戰</h2>
            <div>請輸入你的遊戲暱稱：</div>
            <input type="text" id="nickname" placeholder="例如：小蓉" maxlength="10">
            <br>
            <button onclick="setNickname()">下一步</button>
        </div>

        <!-- 步驟2：設定/輸入邀請碼 -->
        <div id="step2" style="display:none;">
            <h2>🏠 創建/加入房間</h2>
            <div class="room-info">
                <div>你的暱稱：<span id="showName"></span></div>
            </div>
            <button onclick="createRoom()">🎮 我要創建房間（生成邀請碼）</button>
            <br>
            <div style="margin: 20px 0;">
                <span>或輸入好友邀請碼：</span>
                <input type="text" id="inviteCode" placeholder="輸入6位邀請碼" maxlength="6" style="width:150px;">
                <button onclick="joinRoom()">加入</button>
            </div>
        </div>

        <!-- 遊戲主介面 -->
        <div id="game" style="display:none;">
            <div class="room-info">
                <div>👤 玩家1：<span id="player1">等待...</span></div>
                <div>👤 玩家2：<span id="player2">等待...</span></div>
                <div>📱 房間號：<span class="code-display" id="roomCode"></span></div>
            </div>
            <div class="status" id="status">等待對方加入...</div>
            <canvas id="board" width="450" height="450"></canvas>
            <div>
                <button onclick="resetGame()">🔄 重新開始</button>
                <button onclick="copyRoomCode()">📋 分享房間</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('board');
        const ctx = canvas.getContext('2d');
        let nickname = '';
        let myRoomCode = '';
        let board = [];
        let currentPlayer = 1; // 1黑 2白
        let gameOver = false;
        const size = 15;
        const cellSize = 28;

        // localStorage模擬房間系統
        const rooms = JSON.parse(localStorage.getItem('wuziqi_rooms') || '{}');

        function setNickname() {
            const name = document.getElementById('nickname').value.trim();
            if (!name) return alert('請輸入暱稱！');
            nickname = name;
            document.getElementById('showName').textContent = name;
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function createRoom() {
            myRoomCode = 'WUZ' + Math.random().toString(36).substr(2,3).toUpperCase();
            rooms[myRoomCode] = {
                player1: nickname,
                player2: null,
                board: Array(size).fill().map(() => Array(size).fill(0)),
                turn: 1
            };
            localStorage.setItem('wuziqi_rooms', JSON.stringify(rooms));
            
            document.getElementById('player1').textContent = nickname;
            document.getElementById('player2').textContent = '等待對方...';
            document.getElementById('roomCode').textContent = myRoomCode;
            document.getElementById('step2').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('status').textContent = '把房間號發給朋友，一起開戰！';
            initBoard(myRoomCode);
        }

        function joinRoom() {
            const code = document.getElementById('inviteCode').value.toUpperCase();
            if (!rooms[code] || rooms[code].player2) {
                return alert('無效或已滿的房間！');
            }
            rooms[code].player2 = nickname;
            localStorage.setItem('wuziqi_rooms', JSON.stringify(rooms));
            
            myRoomCode = code;
            document.getElementById('player1').textContent = rooms[code].player1;
            document.getElementById('player2').textContent = nickname;
            document.getElementById('roomCode').textContent = code;
            document.getElementById('step2').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('status').textContent = '遊戲開始！';
            initBoard(code);
        }

        function initBoard(roomCode) {
            board = rooms[roomCode].board;
            currentPlayer = rooms[roomCode].turn;
            drawBoard();
            updateStatus();
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = '#8B4513';
            ctx.lineWidth = 1;
            
            for (let i = 0; i <= size; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellSize + 12, 12);
                ctx.lineTo(i * cellSize + 12, 438);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(12, i * cellSize + 12);
                ctx.lineTo(438, i * cellSize + 12);
                ctx.stroke();
            }
            
            for (let x = 0; x < size; x++) {
                for (let y = 0; y < size; y++) {
                    if (board[x][y]) drawPiece(x, y, board[x][y]);
                }
            }
        }

        function drawPiece(x, y, player) {
            const px = x * cellSize + 24;
            const py = y * cellSize + 24;
            ctx.beginPath();
            ctx.arc(px, py, 11, 0, Math.PI * 2);
            ctx.fillStyle = player === 1 ? '#333' : '#fff';
            ctx.fill();
            ctx.strokeStyle = player === 1 ? '#fff' : '#333';
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left - 12) / cellSize);
            const y = Math.floor((e.clientY - rect.top - 12) / cellSize);
            
            if (x >= 0 && x < size && y >= 0 && y < size && board[x][y] === 0) {
                board[x][y] = currentPlayer;
                drawBoard();
                
                if (checkWin(x, y)) {
                    const winner = currentPlayer === 1 ? '黑子' : '白子';
                    document.getElementById('status').innerHTML = `🎉 ${winner} 勝利！`;
                    gameOver = true;
                    return;
                }
                
                currentPlayer = 3 - currentPlayer;
                rooms[myRoomCode].board = board;
                rooms[myRoomCode].turn = currentPlayer;
                localStorage.setItem('wuziqi_rooms', JSON.stringify(rooms));
                updateStatus();
            }
        });

        function checkWin(x, y) {
            const directions = [[1,0],[0,1],[1,1],[1,-1]];
            for (let [dx, dy] of directions) {
                let count = 1;
                for (let i = 1; i < 5; i++) {
                    let nx = x + dx * i, ny = 2 * dy * i;
                    if (nx < 0 || nx >= size || ny < 0 || ny >= size || board[nx][ny] !== currentPlayer) break;
                    count++;
                }
                for (let i = 1; i < 5; i++) {
                    let nx = x - dx * i, ny = y - dy * i;
                    if (nx < 0 || nx >= size || ny < 0 || ny >= size || board[nx][ny] !== currentPlayer) break;
                    count++;
                }
                if (count >= 5) return true;
            }
            return false;
        }

        function updateStatus() {
            const p1El = document.getElementById('player1');
            const p2El = document.getElementById('player2');
            p1El.className = currentPlayer === 1 ? 'player black waiting' : 'player black';
            p2El.className = currentPlayer === 2 ? 'player white waiting' : 'player white';
            document.getElementById('status').textContent = `輪到 ${currentPlayer === 1 ? '黑子' : '白子'}`;
        }

        function resetGame() {
            board = Array(size).fill().map(() => Array(size).fill(0));
            currentPlayer = 1;
            gameOver = false;
            rooms[myRoomCode].board = board;
            rooms[myRoomCode].turn = 1;
            localStorage.setItem('wuziqi_rooms', JSON.stringify(rooms));
            initBoard(myRoomCode);
        }

        function copyRoomCode() {
            navigator.clipboard.writeText(`${window.location.href} (${myRoomCode})`).then(() => {
                alert('房間連結已複製！直接發給朋友～');
            });
        }

        // 每秒同步房間狀態
        setInterval(() => {
            if (myRoomCode && rooms[myRoomCode]) {
                board = rooms[myRoomCode].board;
                currentPlayer = rooms[myRoomCode].turn;
                drawBoard();
                updateStatus();
            }
        }, 1000);
    </script>
</body>
</html>
