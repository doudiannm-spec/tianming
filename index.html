<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>在线中国象棋</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 20px;
        }
        
        .game-area {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .info-panel {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        #chessBoard {
            background: #f9d6b8;
            border: 3px solid #8b4513;
            display: block;
            margin: 0 auto;
            border-radius: 5px;
        }
        
        .room-controls {
            margin-bottom: 20px;
            display: grid;
            gap: 10px;
        }
        
        input, button {
            padding: 12px;
            border-radius: 8px;
            font-size: 16px;
        }
        
        input {
            border: 2px solid #ddd;
        }
        
        button {
            background: linear-gradient(to right, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        button:hover {
            transform: translateY(-2px);
        }
        
        .room-info {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
            border-left: 4px solid #667eea;
        }
        
        .chat-area {
            border: 2px solid #eee;
            border-radius: 10px;
            overflow: hidden;
            margin-top: 20px;
        }
        
        #chatMessages {
            height: 300px;
            overflow-y: auto;
            padding: 15px;
            background: #f9f9f9;
        }
        
        .chat-input {
            display: flex;
            border-top: 2px solid #eee;
        }
        
        #chatInput {
            flex: 1;
            border: none;
            border-radius: 0;
        }
        
        #sendChatBtn {
            width: 80px;
            border-radius: 0;
        }
        
        .message {
            background: white;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .red-piece { color: #c00; font-weight: bold; }
        .black-piece { color: #000; font-weight: bold; }
        
        /* 手机适配 */
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
            #chessBoard {
                width: 100%;
                height: auto;
            }
        }
        
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
            padding: 10px 20px;
            background: #f0f7ff;
            border-radius: 10px;
        }
        
        .player-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(to right, #667eea, #764ba2);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-area">
            <div class="status-bar">
                <div class="player-info">
                    <div class="avatar">我</div>
                    <div>
                        <div>玩家A (红方)</div>
                        <div id="myStatus">等待加入...</div>
                    </div>
                </div>
                <div id="turnInfo" style="font-size: 18px; font-weight: bold; color: #667eea;">
                    请创建或加入房间
                </div>
                <div class="player-info">
                    <div>
                        <div>玩家B (黑方)</div>
                        <div id="opponentStatus">未加入</div>
                    </div>
                    <div class="avatar">敌</div>
                </div>
            </div>
            
            <canvas id="chessBoard" width="600" height="667"></canvas>
        </div>
        
        <div class="info-panel">
            <div class="room-controls">
                <button id="createRoomBtn">🏠 创建新房间</button>
                <div style="text-align: center; color: #666; margin: 10px 0;">或</div>
                <input type="text" id="roomIdInput" placeholder="输入房间号加入...">
                <button id="joinRoomBtn">🔗 加入房间</button>
            </div>
            
            <div class="room-info">
                <h3>🔄 实时状态</h3>
                <div id="roomInfo">未连接到房间</div>
                <div id="gameInfo">游戏未开始</div>
                <div>当前回合: <span id="currentTurn">-</span></div>
            </div>
            
            <div class="chat-area">
                <h3>💬 聊天室</h3>
                <div id="chatMessages">
                    <div class="message system">💡 系统: 欢迎来到在线象棋！创建房间后邀请好友一起玩吧！</div>
                </div>
                <div class="chat-input">
                    <input type="text" id="chatInput" placeholder="输入消息..." onkeypress="if(event.key=='Enter') sendChat()">
                    <button id="sendChatBtn" onclick="sendChat()">发送</button>
                </div>
            </div>
            
            <div style="margin-top: 20px; color: #666; font-size: 14px;">
                <h4>🎮 操作说明</h4>
                <p>1. 点击创建房间，获得房间号</p>
                <p>2. 分享房间号给朋友</p>
                <p>3. 朋友输入房间号加入</p>
                <p>4. 红方先走，轮流下棋</p>
                <p>5. 点击棋子选择，再点击目标位置移动</p>
            </div>
        </div>
    </div>
    
    <script src="game.js"></script>
</body>
</html>
