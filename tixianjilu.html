<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>提现记录 - 编辑系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        
        body {
            background-color: #f7f7f7;
        }
        
        .container {
            max-width: 500px;
            margin: 0 auto;
            background-color: #fff;
            min-height: 100vh;
            position: relative;
        }
        
        /* 顶部导航栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background-color: #fff;
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 1px solid #eee;
        }
        
        .back-btn {
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .back-arrow {
            width: 12px;
            height: 12px;
            border-left: 2px solid #333;
            border-top: 2px solid #333;
            transform: rotate(-45deg);
        }
        
        .title {
            font-size: 16px;
            font-weight: normal;
            color: #333;
        }
        
        /* 右上角按钮组 */
        .header-btns {
            display: flex;
            align-items: center;
            background-color: #555;
            border-radius: 20px;
            padding: 5px 10px;
            height: 36px;
        }
        
        .menu-dots {
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.3);
            padding-right: 10px;
        }
        
        .dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background-color: #fff;
            margin: 0 2px;
        }
        
        .circle-btn {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .circle-inner {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background-color: #fff;
        }
        
        /* 提现记录列表 */
        .records-list {
            padding: 10px 0;
        }
        
        .record-item {
            background-color: #ffd166;
            padding: 15px;
            margin-bottom: 1px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .record-item:hover {
            background-color: #ffca3a;
        }
        
        .amount {
            font-size: 16px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .order-no {
            font-size: 14px;
            color: #333;
            margin-bottom: 5px;
        }
        
        .status {
            font-size: 14px;
            color: #0066cc;
        }
        
        /* 编辑模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }
        
        .modal-content {
            background-color: white;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            padding: 25px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        
        .modal-header {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 20px;
            text-align: center;
            color: #333;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        
        .form-select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            background-color: white;
            cursor: pointer;
        }
        
        .modal-actions {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .btn-cancel {
            background-color: #f5f5f5;
            color: #333;
        }
        
        .btn-cancel:hover {
            background-color: #e5e5e5;
        }
        
        .btn-save {
            background-color: #0066cc;
            color: white;
        }
        
        .btn-save:hover {
            background-color: #0052a3;
        }
        
        /* 编辑提示 */
        .edit-tip {
            text-align: center;
            padding: 10px 0;
            font-size: 14px;
            color: #666;
            background-color: #f9f9f9;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <div class="header">
            <div class="back-btn">
                <div class="back-arrow"></div>
            </div>
            <div class="title">提现记录</div>
            <div class="header-btns">
                <div class="menu-dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
                <div class="circle-btn">
                    <div class="circle-inner"></div>
                </div>
            </div>
        </div>
        
        
        
        <!-- 提现记录列表 -->
        <div class="records-list" id="recordsList">
            <!-- 记录将通过JavaScript动态生成 -->
        </div>
    </div>
    
    <!-- 编辑模态框 -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header">编辑提现记录</div>
            
            <div class="form-group">
                <label class="form-label">提现金额(¥)</label>
                <input type="number" step="0.01" class="form-input" id="editAmount" placeholder="请输入金额">
            </div>
            
            <div class="form-group">
                <label class="form-label">订单号</label>
                <input type="text" class="form-input" id="editOrderNo" placeholder="请输入订单号">
            </div>
            
            <div class="form-group">
                <label class="form-label">状态</label>
                <select class="form-select" id="editStatus">
                    <option value="审核通过">审核通过</option>
                    <option value="审核中">审核中</option>
                    <option value="审核失败">审核失败</option>
                    <option value="已到账">已到账</option>
                </select>
            </div>
            
            <div class="modal-actions">
                <button class="btn btn-cancel" id="cancelBtn">取消</button>
                <button class="btn btn-save" id="saveBtn">保存</button>
            </div>
        </div>
    </div>
    
    <script>
        // 初始化提现记录数据
        const records = [
            { id: 1, amount: 1823.00, orderNo: "CO2509291527386621", status: "审核通过" },
            { id: 2, amount: 1972.00, orderNo: "CO2509291527212645", status: "审核通过" },
            { id: 3, amount: 2374.00, orderNo: "CO2509291527049759", status: "审核通过" },
            { id: 4, amount: 1896.00, orderNo: "CO2509291526438838", status: "审核通过" },
            { id: 5, amount: 2010.00, orderNo: "CO2509291526295927", status: "审核通过" },
            { id: 6, amount: 2058.00, orderNo: "CO2509291526086764", status: "审核通过" },
            { id: 7, amount: 1789.00, orderNo: "CO2509291525507482", status: "审核通过" },
            { id: 8, amount: 1860.00, orderNo: "CO2509291509221826", status: "审核通过" },
            { id: 9, amount: 1596.00, orderNo: "CO2509291508575497", status: "审核通过" }
        ];
        
        // DOM元素
        const recordsList = document.getElementById('recordsList');
        const editModal = document.getElementById('editModal');
        const editAmount = document.getElementById('editAmount');
        const editOrderNo = document.getElementById('editOrderNo');
        const editStatus = document.getElementById('editStatus');
        const cancelBtn = document.getElementById('cancelBtn');
        const saveBtn = document.getElementById('saveBtn');
        
        // 当前编辑的记录ID
        let currentEditId = null;
        
        // 渲染记录列表
        function renderRecords() {
            recordsList.innerHTML = '';
            
            records.forEach(record => {
                const recordElement = document.createElement('div');
                recordElement.className = 'record-item';
                recordElement.setAttribute('data-id', record.id);
                
                recordElement.innerHTML = `
                    <div class="amount">提现金额(¥)：${record.amount.toFixed(2)}</div>
                    <div class="order-no">订单号：${record.orderNo}</div>
                    <div class="status">状态：${record.status}</div>
                `;
                
                // 添加点击事件
                recordElement.addEventListener('click', () => {
                    openEditModal(record.id);
                });
                
                recordsList.appendChild(recordElement);
            });
        }
        
        // 打开编辑模态框
        function openEditModal(recordId) {
            const record = records.find(r => r.id === recordId);
            if (!record) return;
            
            currentEditId = recordId;
            
            // 填充表单数据
            editAmount.value = record.amount;
            editOrderNo.value = record.orderNo;
            editStatus.value = record.status;
            
            // 显示模态框
            editModal.style.display = 'flex';
        }
        
        // 关闭编辑模态框
        function closeEditModal() {
            editModal.style.display = 'none';
            currentEditId = null;
            
            // 清空表单
            editAmount.value = '';
            editOrderNo.value = '';
            editStatus.value = '审核通过';
        }
        
        // 保存编辑
        function saveEdit() {
            if (!currentEditId) return;
            
            const recordIndex = records.findIndex(r => r.id === currentEditId);
            if (recordIndex === -1) return;
            
            // 验证输入
            const newAmount = parseFloat(editAmount.value);
            const newOrderNo = editOrderNo.value.trim();
            const newStatus = editStatus.value;
            
            if (isNaN(newAmount) || newAmount <= 0) {
                alert('请输入有效的金额');
                return;
            }
            
            if (!newOrderNo) {
                alert('请输入订单号');
                return;
            }
            
            // 更新记录
            records[recordIndex].amount = newAmount;
            records[recordIndex].orderNo = newOrderNo;
            records[recordIndex].status = newStatus;
            
            // 重新渲染记录列表
            renderRecords();
            
            // 关闭模态框
            closeEditModal();
            
            // 显示保存成功消息
            alert('记录已保存成功！');
        }
        
        // 初始化事件监听器
        function initEventListeners() {
            // 取消按钮
            cancelBtn.addEventListener('click', closeEditModal);
            
            // 保存按钮
            saveBtn.addEventListener('click', saveEdit);
            
            // 点击模态框背景关闭
            editModal.addEventListener('click', (e) => {
                if (e.target === editModal) {
                    closeEditModal();
                }
            });
            
            // 按ESC键关闭模态框
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape' && editModal.style.display === 'flex') {
                    closeEditModal();
                }
            });
            
            // 按Enter键保存
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && editModal.style.display === 'flex') {
                    saveEdit();
                }
            });
        }
        
        // 初始化应用
        function init() {
            renderRecords();
            initEventListeners();
        }
        
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
